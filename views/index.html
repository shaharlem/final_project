<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Citizen Request Form</title>
    <style>
      :root {
        --navy: #0a1f3d;
        --mustard: #d4a017;
        --page-bg: #eef1f5;
        --card-bg: #f7f8fa;
        --text: #1f2937;
        --muted: #6b7280;
        --border: #d7dce3;
        --white: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: var(--page-bg);
        color: var(--text);
      }

      .topbar {
        background: var(--navy);
        color: var(--white);
        padding: 22px 32px;
        border-bottom: 6px solid var(--mustard);
      }

      .topbar__title {
        margin: 0;
        font-size: 1.15rem;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .page {
        max-width: 860px;
        margin: 40px auto;
        padding: 0 20px 40px;
      }

      .form-card {
        background: var(--card-bg);
        border: 1px solid rgba(10, 31, 61, 0.08);
        border-radius: 20px;
        padding: 32px;
        box-shadow: 0 12px 35px rgba(10, 31, 61, 0.08);
      }

      .form-header {
        margin-bottom: 28px;
      }

      .form-header h1 {
        margin: 0 0 10px;
        color: var(--navy);
        font-size: 2rem;
      }

      .form-header p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
        max-width: 680px;
      }

      .request-form {
        display: grid;
        gap: 22px;
      }

      .field-group {
        display: grid;
        gap: 8px;
      }

      label {
        font-weight: 700;
        color: var(--navy);
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 14px 16px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--white);
        font: inherit;
        color: var(--text);
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: var(--mustard);
        box-shadow: 0 0 0 4px rgba(212, 160, 23, 0.15);
      }

      textarea {
        min-height: 170px;
        resize: vertical;
      }

      .helper-text {
        font-size: 0.92rem;
        color: var(--muted);
      }

      .upload-box {
        position: relative;
        border: 2px dashed rgba(10, 31, 61, 0.22);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.9);
        padding: 28px 20px;
        text-align: center;
      }

      .upload-box strong {
        display: block;
        color: var(--navy);
        font-size: 1.05rem;
        margin-bottom: 8px;
      }

      .upload-box input[type="file"] {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
      }

      .submit-row {
        padding-top: 8px;
      }

      .submit-button {
        border: none;
        border-radius: 999px;
        background: var(--mustard);
        color: var(--navy);
        font-weight: 700;
        font-size: 1rem;
        padding: 15px 24px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        box-shadow: 0 10px 18px rgba(212, 160, 23, 0.24);
      }

      .submit-button:hover {
        filter: brightness(1.03);
      }

      .submit-button .arrow {
        font-size: 1.1rem;
        line-height: 1;
      }

      .submit-button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }

      .form-error {
        display: none;
        margin: 0;
        padding: 12px 14px;
        border-radius: 12px;
        background: #fde8e8;
        color: #9b1c1c;
        font-size: 0.95rem;
      }

      .form-error.is-visible {
        display: block;
      }

      @media (max-width: 640px) {
        .topbar {
          padding: 18px 20px;
        }

        .page {
          margin: 24px auto;
          padding: 0 14px 24px;
        }

        .form-card {
          padding: 22px 18px;
          border-radius: 18px;
        }

        .form-header h1 {
          font-size: 1.7rem;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <p class="topbar__title">Citizen Services Portal</p>
    </header>

    <main class="page">
      <section class="form-card">
        <div class="form-header">
          <h1>Submit a Request</h1>
          <p>
            Please provide accurate information to help us process your request
            efficiently. Standard response time is 3-5 business days.
          </p>
        </div>

        <p id="formError" class="form-error" role="alert"></p>

        <form id="requestForm" class="request-form">
          <div class="field-group">
            <label for="fullName">Full Name</label>
            <input
              id="fullName"
              name="fullName"
              type="text"
              placeholder="John Doe"
            />
          </div>

          <div class="field-group">
            <label for="email">Email Address</label>
            <input
              id="email"
              name="email"
              type="email"
              placeholder="john.doe@example.gov"
            />
          </div>

          <div class="field-group">
            <label for="phone">Phone Number</label>
            <input
              id="phone"
              name="phone"
              type="tel"
              placeholder="+1 (555) 000-0000"
            />
          </div>

          <div class="field-group">
            <label for="category">Request Category</label>
            <select id="category" name="category">
              <option value="" selected disabled>Select a category</option>
              <option value="parking_fines">Parking fines</option>
              <option value="property_tax">Property tax</option>
              <option value="appointment_requests">Appointment requests</option>
              <option value="city_cleaning">City cleaning</option>
              <option value="events">Events</option>
              <option value="road_safety">Road safety</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="field-group">
            <label for="message">Detailed Message</label>
            <textarea
              id="message"
              name="message"
              placeholder="Please describe your request in detail..."
            ></textarea>
            <span class="helper-text">20-20,000 characters</span>
          </div>

          <div class="field-group">
            <label for="documents">Supporting Documents</label>
            <div class="upload-box">
              <strong>Attach files</strong>
              <span class="helper-text"
                >JPG, PNG, PDF, DOCX up to 10MB</span
              >
              <input id="documents" name="documents" type="file" multiple />
            </div>
          </div>

          <div class="submit-row">
            <button id="submitButton" class="submit-button" type="submit">
              <span>Submit Request</span>
              <span class="arrow" aria-hidden="true">→</span>
            </button>
          </div>
        </form>
      </section>
    </main>

    <script>
      const form = document.getElementById('requestForm');
      const submitButton = document.getElementById('submitButton');
      const formError = document.getElementById('formError');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();

        formError.classList.remove('is-visible');
        formError.textContent = '';
        submitButton.disabled = true;

        const payload = {
          citizen_name: document.getElementById('fullName').value.trim(),
          citizen_email: document.getElementById('email').value.trim(),
          citizen_phone: document.getElementById('phone').value.trim(),
          category: document.getElementById('category').value,
          message: document.getElementById('message').value.trim(),
        };

        try {
          const response = await fetch('/api/requests', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify(payload),
          });

          if (!response.ok) {
            const result = await response.json().catch(() => ({}));
            throw new Error(result.error || 'Failed to submit request');
          }

          const result = await response.json();
          const params = new URLSearchParams({
            id: result.id,
            category: result.category,
            date: result.created_at,
          });

          window.location.href = `/confirmation.html?${params.toString()}`;
        } catch (error) {
          formError.textContent = error.message;
          formError.classList.add('is-visible');
          submitButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
